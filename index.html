<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="theme-color" content="#0f172a">
  <title>Fahrlehrerprüfung BE Trainer – mit Musterlösungen</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<header class="topbar">
  <div>
    <div class="eyebrow">Detmold · Klasse BE</div>
    <h1>Fahrlehrerprüfung Trainer</h1>
  </div>
  <button id="resetBtn" class="ghost">Fortschritt löschen</button>
</header>

<main class="layout">
  <aside class="sidebar">
    <nav id="nav"></nav>
    <section class="stats-card">
      <h2>Fortschritt</h2>
      <div class="ring"><span id="progressPct">0%</span></div>
      <div class="stat-row"><span>Sicher</span><strong id="knownCount">0</strong></div>
      <div class="stat-row"><span>Unsicher</span><strong id="unsureCount">0</strong></div>
      <div class="stat-row"><span>Offen</span><strong id="openCount">0</strong></div>
    </section>
  </aside>

  <section class="content">
    <div class="toolbar">
      <select id="categorySelect" aria-label="Fachgebiet"></select>
      <select id="statusSelect" aria-label="Lernstatus">
        <option value="all">Alle Lernstände</option>
        <option value="open">Offen</option>
        <option value="unsure">Unsicher</option>
        <option value="known">Sicher</option>
      </select>
      <input id="searchInput" type="search" placeholder="Fragen durchsuchen …">
      <button id="randomBtn">Zufallsfrage</button>
    </div>

    <section id="dashboard" class="panel"></section>

    <section id="trainer" class="panel hidden">
      <div class="question-meta">
        <span id="categoryBadge" class="badge"></span>
        <span id="counter"></span>
        <span id="timer"></span>
      </div>
      <h2 id="questionTitle"></h2>
      <p id="questionContext" class="context"></p>
      <ol id="subquestions" class="subquestions"></ol>
      <textarea id="answerInput" placeholder="Antwort frei formulieren …"></textarea>
      <div class="actions">
        <button id="showAnswerBtn">Musterlösung anzeigen</button>
        <button id="nextBtn" class="ghost">Überspringen</button>
      </div>
      <div id="solution" class="solution hidden"></div>
      <div id="rating" class="rating hidden">
        <span>Selbsteinschätzung:</span>
        <button data-rating="open" class="danger">Nicht gekonnt</button>
        <button data-rating="unsure" class="warn">Unsicher</button>
        <button data-rating="known" class="success">Sicher</button>
      </div>
    </section>

    <section id="examSetup" class="panel hidden"></section>
    <section id="history" class="panel hidden"></section>
  </section>
</main>
<script src="data.js"></script>
<script src="app.js"></script>
</body>
</html>
